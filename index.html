<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>imyoo studio — schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 로그인 화면 -->
  <div id="login-screen" class="screen">
    <div class="login-box">
      <div class="brand-logo">
        <span class="brand-im">im</span><span class="brand-yoo">yoo</span>
      </div>
      <p class="brand-sub">studio</p>
      <div class="divider"></div>
      <p class="login-title">Schedule Management</p>
      <button id="google-login-btn" class="google-btn">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        <span>Sign in with Google</span>
      </button>
      <p id="login-error" class="error"></p>
    </div>
  </div>

  <!-- 메인 앱 -->
  <div id="app-screen" class="screen hidden">
    <header class="top-bar">
      <div class="brand-inline">
        <span class="brand-im">im</span><span class="brand-yoo">yoo</span>
        <span class="brand-studio">studio</span>
      </div>
      <div class="user-info">
        <span id="user-name"></span>
        <span id="user-role" class="role-badge"></span>
        <button id="logout-btn" class="ghost-btn">Logout</button>
      </div>
    </header>

    <nav class="tab-bar">
      <div class="tab-inner">
        <button class="tab-btn active" data-tab="calendar">Calendar</button>
        <button class="tab-btn" data-tab="list">Schedule</button>
        <button class="tab-btn admin-only hidden" data-tab="admin">Manage</button>
      </div>
    </nav>

    <main class="content">
      <!-- 달력 탭 -->
      <section id="calendar-tab" class="tab-content">
        <div class="calendar-header">
          <button id="prev-month" class="nav-btn">‹</button>
          <h2 id="current-month">2026</h2>
          <button id="next-month" class="nav-btn">›</button>
          <button id="add-wedding-btn" class="primary-btn admin-only hidden">+ New Event</button>
        </div>
        <div id="calendar-grid" class="calendar-grid"></div>
      </section>

      <!-- 목록 탭 -->
      <section id="list-tab" class="tab-content hidden">
        <div class="list-filter">
          <button class="filter-btn active" data-filter="upcoming">Upcoming</button>
          <button class="filter-btn" data-filter="mine">My Events</button>
          <button class="filter-btn" data-filter="all">All</button>
        </div>
        <div id="wedding-list" class="wedding-list">
          <p class="empty-msg">No events scheduled.</p>
        </div>
      </section>

      <!-- 관리 탭 -->
      <section id="admin-tab" class="tab-content hidden">
        <div class="section-header">
          <h2>Team Management</h2>
          <p>Change member roles between admin and staff.</p>
        </div>
        <div id="staff-list" class="staff-list"></div>
      </section>
    </main>
  </div>

  <!-- 예식 모달 -->
  <div id="wedding-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-title">New Event</h2>
        <button class="modal-close" id="modal-close-btn">×</button>
      </div>

      <div class="modal-body">
        <div class="form-section">
          <div class="form-row">
            <label>Date *</label>
            <input type="date" id="w-date" />
          </div>
          <div class="form-row-2col">
            <div class="form-row">
              <label>Time</label>
              <input type="time" id="w-time" />
            </div>
            <div class="form-row">
              <label>신랑 · 신부</label>
              <input type="text" id="w-couple" placeholder="예: 김철수 · 이영희" />
            </div>
          </div>
          <div class="form-row">
            <label>Venue *</label>
            <input type="text" id="w-venue" placeholder="예: 더케이호텔 그랜드볼룸" />
          </div>
        </div>

        <div class="form-section">
          <div class="form-row">
            <label>Concept</label>
            <input type="text" id="w-concept" placeholder="예: Romantic Garden, White Classic" />
          </div>
          <div class="form-row">
            <label>Decoration</label>
            <textarea id="w-decoration" rows="2" placeholder="메인 아치, 버진로드, 웰컴테이블, 포토존..."></textarea>
          </div>
        </div>

        <div class="form-section">
          <div class="form-row">
            <label>Assigned Team</label>
            <div id="w-staff-checkboxes" class="checkbox-group"></div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-row-2col">
            <div class="form-row">
              <label>Price (KRW)</label>
              <input type="number" id="w-price" placeholder="2,500,000" />
            </div>
            <div class="form-row">
              <label>Status</label>
              <div class="status-toggle">
                <label class="toggle-label">
                  <input type="checkbox" id="w-paid" />
                  <span>입금 완료</span>
                </label>
                <label class="toggle-label">
                  <input type="checkbox" id="w-settled" />
                  <span>정산 완료</span>
                </label>
              </div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-row">
            <label>Notes</label>
            <textarea id="w-memo" rows="2" placeholder="특이사항, 요청사항..."></textarea>
          </div>
        </div>

        <div class="form-section">
          <div class="form-row">
            <label>Checklist</label>
            <div id="checklist-container"></div>
            <div class="checklist-add-row">
              <input type="text" id="new-checklist-item" placeholder="항목 입력 후 Enter" />
              <button type="button" id="add-checklist-btn" class="secondary-btn">Add</button>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button id="delete-wedding-btn" class="danger-btn hidden">Delete</button>
        <div style="flex:1"></div>
        <button id="cancel-btn" class="ghost-btn">Cancel</button>
        <button id="save-wedding-btn" class="primary-btn">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
